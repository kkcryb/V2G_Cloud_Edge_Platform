# 根目录 docker-compose.yml (基础设施层)
version: '3.8'
services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=raw_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=r9JyPrSWd43AiXptUeiVtWrKk1Ut38kjDxqBdfxeBDLVHj4wOrCgZ1_x8-Q-0oIeO9hkZKXWkSFt8PMZYiOccQ==

  emqx: # 或用 mosquitto 都可以
    image: emqx:5.3.0
    ports:
      - "1883:1883"
      - "18083:18083" # Dashboard 控制台